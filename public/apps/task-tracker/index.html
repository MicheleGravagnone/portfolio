<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=680, height=420, initial-scale=1">
  <title>Task Tracker CLI</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

    html, body {
      width: 680px; height: 420px;
      overflow: hidden;
      background: #24273a;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    #terminal { width: 100%; height: 100%; display: flex; flex-direction: column; }

    /* ── Title bar ── */
    .titlebar {
      height: 30px; flex-shrink: 0;
      background: #1e2030;
      display: flex; align-items: center;
      padding: 0 12px;
      border-bottom: 1px solid #363a4f;
      user-select: none;
    }
    .dots { display: flex; gap: 7px; margin-right: 12px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-r { background: #ed8796; }
    .dot-y { background: #eed49f; }
    .dot-g { background: #a6da95; }
    .tname { color: #6e738d; font-size: 11px; letter-spacing: 0.04em; }

    /* ── Output scroll area ── */
    #output {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 10px 14px 4px;
    }
    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-thumb { background: #363a4f; border-radius: 2px; }

    .ln { display: block; white-space: pre; min-height: 1.45em; }

    /* ── Input row ── */
    .input-row {
      flex-shrink: 0;
      display: flex; align-items: center;
      padding: 3px 14px 8px;
      border-top: 1px solid #363a4f;
    }
    .ps1 { color: #a6da95; margin-right: 6px; white-space: nowrap; user-select: none; }
    #inp {
      flex: 1; background: transparent; border: none; outline: none;
      color: #cad3f5; font-family: inherit; font-size: inherit;
      caret-color: #c6a0f6;
    }
    #inp::placeholder { color: #363a4f; }

    /* ── Catppuccin Macchiato palette ── */
    .cb  { color: #b7bdf8; }  /* border/lavender */
    .ci  { color: #c6a0f6; }  /* id/mauve */
    .cw  { color: #cad3f5; }  /* white/text */
    .cg  { color: #5b6078; }  /* gray/overlay0 */
    .cgr { color: #a6da95; }  /* green */
    .cy  { color: #eed49f; }  /* yellow/amber */
    .cr  { color: #ed8796; }  /* red */
    .cbl { color: #8aadf4; }  /* blue */
    b    { font-weight: 700; }
    .dim { opacity: 0.5; }
  </style>
</head>
<body>
<div id="terminal">

  <div class="titlebar">
    <div class="dots">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>
    <span class="tname">bash — task-tracker-cli</span>
  </div>

  <div id="output"></div>

  <div class="input-row">
    <span class="ps1">$</span>
    <input id="inp" type="text" autocomplete="off" spellcheck="false"
           placeholder="task-cli [command]" autofocus>
  </div>

</div>
<script>
// ── Helpers ─────────────────────────────────────────────────────────────────
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const S = (cls, s) => `<span class="${cls}">${esc(s)}</span>`;
const B = s => `<b>${s}</b>`;
const cb  = s => S('cb',  s);
const ci  = s => S('ci',  s);
const cw  = s => S('cw',  s);
const cg  = s => S('cg',  s);
const cgr = s => S('cgr', s);
const cy  = s => S('cy',  s);
const cr  = s => S('cr',  s);
const cbl = s => S('cbl', s);
const dim = s => `<span class="dim">${s}</span>`;

function pad(s, n) {
  s = String(s);
  return s.length >= n ? s.slice(0, n) : s + ' '.repeat(n - s.length);
}

// ── State ────────────────────────────────────────────────────────────────────
// Today is fixed so due-date colours stay consistent
const TODAY = '2026-06-28';

let nextId = 6;
let tasks = [
  { id:1, desc:'Design system architecture',   status:'done',        ca:'2026-06-20T09:00:00Z', ua:'2026-06-22T14:30:00Z', due:null          },
  { id:2, desc:'Implement REST API endpoints', status:'done',        ca:'2026-06-22T10:00:00Z', ua:'2026-06-25T16:45:00Z', due:null          },
  { id:3, desc:'Write unit tests',             status:'done',        ca:'2026-06-25T09:00:00Z', ua:'2026-06-27T11:20:00Z', due:null          },
  { id:4, desc:'Set up CI/CD pipeline',        status:'in-progress', ca:'2026-06-27T14:00:00Z', ua:'2026-06-28T09:15:00Z', due:'2026-06-28' },
  { id:5, desc:'Deploy to production',         status:'todo',        ca:'2026-06-28T09:00:00Z', ua:'2026-06-28T09:00:00Z', due:'2026-07-01' },
];

let history = [], histIdx = -1;

// ── Date helpers ─────────────────────────────────────────────────────────────
function daysDiff(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  const t = new Date(TODAY + 'T12:00:00Z');
  return Math.round((d - t) / 86400000);
}
const isOverdue   = t => t.due && t.status !== 'done' && daysDiff(t.due) < 0;
const isDueToday  = t => t.due && t.status !== 'done' && daysDiff(t.due) === 0;

// ── Output rendering ─────────────────────────────────────────────────────────
const out = document.getElementById('output');

function emit(html) {
  const el = document.createElement('span');
  el.className = 'ln';
  el.innerHTML = html;
  out.appendChild(el);
}

function scroll() { out.scrollTop = out.scrollHeight; }

// ── Message prefixes ─────────────────────────────────────────────────────────
const ok   = msg => emit('  ' + B(cgr('+ ')) + cw(msg));
const err  = msg => emit('  ' + B(cr('x '))  + cw(msg));
const info = msg => emit('  ' + cbl('> ')    + cw(msg));

// ── Table ─────────────────────────────────────────────────────────────────────
// Column widths: 4 · 13 · 30 · 11 · 14  → row total 88 chars (with borders)
const CW = [4, 13, 30, 11, 14];
const HR = {
  seg: (w, l, r, m) => (i) => i === 0 ? l : i === CW.length ? r : m,
  row: (L, M, R, fill) => {
    let s = L;
    CW.forEach((w, i) => { s += fill.repeat(w + 2) + (i < CW.length-1 ? M : R); });
    return s;
  },
};

const tableTop = () => cb(HR.row('╭','┬','╮','─'));
const tableMid = () => cb(HR.row('├','┼','┤','─'));
const tableBot = () => cb(HR.row('╰','┴','╯','─'));
const sep = () => cb('│');

function tableHeader() {
  const cols = ['ID','Status','Description','Updated','Due'];
  return sep() + cols.map((h,i) => ' ' + B(cw(pad(h, CW[i]))) + ' ' + sep()).join('');
}

function fmtUpdated(iso) {
  const d = new Date(iso);
  const mm  = String(d.getUTCMonth()+1).padStart(2,'0');
  const dd  = String(d.getUTCDate()).padStart(2,'0');
  const hh  = String(d.getUTCHours()).padStart(2,'0');
  const min = String(d.getUTCMinutes()).padStart(2,'0');
  return `${mm}/${dd} ${hh}:${min}`;
}

function fmtStatus(status) {
  if (status === 'done')        return cgr('+ ' + pad('done', CW[1]-2));
  if (status === 'in-progress') return cy( '~ ' + pad('in-progress', CW[1]-2));
  return cg('- ' + pad('todo', CW[1]-2));
}

function fmtDueCell(t) {
  if (!t.due) return cg(pad('-', CW[4]));
  const diff = daysDiff(t.due);
  if (t.status === 'done')  return cg(pad(t.due, CW[4]));
  if (diff < 0)             return B(cr(pad(`${t.due} !${Math.abs(diff)}d`, CW[4])));
  if (diff === 0)           return B(cy(pad('today', CW[4])));
  if (diff <= 3)            return B(cy(pad(`${t.due} ${diff}d`, CW[4])));
  return cg(pad(`${t.due} ${diff}d`, CW[4]));
}

function tableRow(t) {
  const dsc = t.desc.length > CW[2] ? t.desc.slice(0, CW[2]-1) + '~' : pad(t.desc, CW[2]);
  return sep()
    + ' ' + ci(pad(t.id, CW[0])) + ' ' + sep()
    + ' ' + fmtStatus(t.status) + ' ' + sep()
    + ' ' + cw(dsc)              + ' ' + sep()
    + ' ' + cg(pad(fmtUpdated(t.ua), CW[3])) + ' ' + sep()
    + ' ' + fmtDueCell(t)        + ' ' + sep();
}

function renderTable(list) {
  emit(tableTop());
  emit(tableHeader());
  emit(tableMid());
  list.forEach(t => emit(tableRow(t)));
  emit(tableBot());
  emit('    ' + dim(cg(`${list.length} task(s) shown`)));
}

// ── Stats line ────────────────────────────────────────────────────────────────
function renderStats(list) {
  const done   = list.filter(t => t.status === 'done').length;
  const active = list.filter(t => t.status === 'in-progress').length;
  const todo   = list.filter(t => t.status === 'todo').length;
  const ovd    = list.filter(isOverdue).length;
  const dt     = list.filter(isDueToday).length;
  const sep2 = cg('  ·  ');
  const parts = [cgr(`${done} done`), cy(`${active} active`), cg(`${todo} todo`)];
  if (ovd > 0) parts.push(B(cr(`${ovd} overdue`)));
  if (dt  > 0) parts.push(cy(`${dt} due today`));
  emit('  ' + parts.join(sep2));
}

// ── Header box ────────────────────────────────────────────────────────────────
const BOX_INNER = 44;

function renderHeaderBox(title) {
  emit(cb('╭' + '─'.repeat(BOX_INNER) + '╮'));
  emit(cb('│') + ' ' + B(cw(pad(title, BOX_INNER - 1))) + cb('│'));
  emit(cb('╰' + '─'.repeat(BOX_INNER) + '╯'));
}

// ── Detail view ───────────────────────────────────────────────────────────────
// Box inner width = 50, row format: │ + '   ' + lbl(13) + value + padding + │
const DW = 50;
const DL = 13;
const DVAL = DW - 3 - DL; // = 34 chars available for value+padding

function detailRow(lbl, valHtml, valPlain) {
  const pad2 = Math.max(0, DVAL - valPlain.length);
  emit(cb('│') + '   ' + cg(pad(lbl, DL)) + valHtml + ' '.repeat(pad2) + cb('│'));
}

function fmtDueDetail(t) {
  if (!t.due) return { html: cg('not set'), plain: 'not set' };
  const diff = daysDiff(t.due);
  if (t.status === 'done') {
    const s = `${t.due}  (completed)`;
    return { html: cg(s), plain: s };
  }
  if (diff < 0) {
    const s = `${t.due}  (overdue by ${Math.abs(diff)} day(s))`;
    return { html: B(cr(s)), plain: s };
  }
  if (diff === 0) {
    const s = `${t.due}  (due today)`;
    return { html: B(cy(s)), plain: s };
  }
  const s = `${t.due}  (in ${diff} day(s))`;
  return { html: cg(s), plain: s };
}

function dtFmt(iso) {
  const d = new Date(iso);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')} ${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
}

function fmtStatusDetail(s) {
  if (s === 'done')        return { html: cgr('done'),        plain: 'done' };
  if (s === 'in-progress') return { html: cy('in-progress'),  plain: 'in-progress' };
  return                          { html: cg('todo'),          plain: 'todo' };
}

function renderDetail(t) {
  const hdr = `Task #${t.id}`;
  emit(cb('╭' + '─'.repeat(DW) + '╮'));
  emit(cb('│') + ' ' + B(cw(hdr)) + ' '.repeat(DW - 1 - hdr.length) + cb('│'));
  emit(cb('├' + '─'.repeat(DW) + '┤'));
  detailRow('Description', cw(t.desc),              t.desc);
  const st = fmtStatusDetail(t.status);
  detailRow('Status',      st.html,                 st.plain);
  const ca = dtFmt(t.ca);
  detailRow('Created',     cg(ca),                  ca);
  const ua = dtFmt(t.ua);
  detailRow('Updated',     cg(ua),                  ua);
  const due = fmtDueDetail(t);
  detailRow('Due',         due.html,                due.plain);
  emit(cb('╰' + '─'.repeat(DW) + '╯'));
}

// ── Help screen ───────────────────────────────────────────────────────────────
function renderHelp() {
  emit('');
  emit('  ' + B(cb('████████╗ █████╗ ███████╗██╗  ██╗')));
  emit('  ' + B(cb('   ██╔══╝██╔══██╗██╔════╝██║ ██╔╝')));
  emit('  ' + B(cb('   ██║   ███████║███████╗█████╔╝ ')));
  emit('  ' + B(cb('   ██║   ██╔══██║╚════██║██╔═██╗ ')));
  emit('  ' + B(cb('   ██║   ██║  ██║███████║██║  ██╗')));
  emit('  ' + cg('Task Tracker CLI  ·  dev.michele'));
  emit('');
  const row = (nm, ag, ds) =>
    emit('  ' + cy(pad(nm, 18)) + cg(pad(ag, 26)) + cw(ds));
  row('add',              '<desc> [--due date]',   'Add a new task');
  row('update',           '<id> <desc>',           'Update description');
  row('due',              '<id> <yyyy-MM-dd>',     'Set or update due date');
  row('delete',           '<id>',                  'Delete a task');
  row('mark-in-progress', '<id>',                  'Mark as in-progress');
  row('mark-done',        '<id>',                  'Mark as done');
  row('list',             '[todo|in-progress|done]','List tasks');
  row('search',           '<query>',               'Search by description');
  row('show',             '<id>',                  'Show task details');
  emit('');
  emit('  ' + dim(cg('Tasks are stored in ./tasks.json')));
  emit('');
}

// ── Commands ──────────────────────────────────────────────────────────────────
function now() { return new Date().toISOString(); }

function findTask(idStr) {
  const id = parseInt(idStr, 10);
  if (isNaN(id)) { err('Invalid ID'); return null; }
  const t = tasks.find(t => t.id === id);
  if (!t) { err(`Task ${id} not found`); return null; }
  return t;
}

function listCmd(filter) {
  const valid = ['todo', 'in-progress', 'done'];
  if (filter && !valid.includes(filter)) {
    err(`Unknown filter "${filter}". Use: todo, in-progress, done`);
    return;
  }
  const list = filter ? tasks.filter(t => t.status === filter) : tasks;
  const title = filter ? `Tasks · ${filter}` : 'All tasks';
  emit('');
  renderHeaderBox(title);
  emit('');
  renderStats(tasks);
  emit('');
  if (list.length === 0) info('No tasks found.');
  else renderTable(list);
  emit('');
}

function dispatch(args) {
  const cmd = args[0];
  if (!cmd) { renderHelp(); return; }

  switch (cmd) {
    case 'list':
      listCmd(args[1] || null);
      break;

    case 'add': {
      const dIdx = args.indexOf('--due');
      let dueVal = null;
      let rest = args.slice(1);
      if (dIdx !== -1) {
        dueVal = args[dIdx + 1] || null;
        rest = args.slice(1, dIdx);
      }
      const desc = rest.join(' ').replace(/^["']|["']$/g, '');
      if (!desc) { err('Description is required'); return; }
      if (dueVal && !/^\d{4}-\d{2}-\d{2}$/.test(dueVal)) {
        err(`Invalid date format. Use yyyy-MM-dd`); return;
      }
      const t = { id: nextId++, desc, status:'todo', ca: now(), ua: now(), due: dueVal };
      tasks.push(t);
      ok(`Task added (ID: ${t.id})`);
      emit('');
      break;
    }

    case 'update': {
      const t = findTask(args[1]); if (!t) return;
      const nd = args.slice(2).join(' ').replace(/^["']|["']$/g, '');
      if (!nd) { err('New description is required'); return; }
      t.desc = nd; t.ua = now();
      ok(`Task ${t.id} updated`);
      emit('');
      break;
    }

    case 'due': {
      const t = findTask(args[1]); if (!t) return;
      const d = args[2];
      if (!d || !/^\d{4}-\d{2}-\d{2}$/.test(d)) {
        err('Provide a valid date: yyyy-MM-dd'); return;
      }
      t.due = d; t.ua = now();
      ok(`Due date set for task ${t.id}`);
      emit('');
      break;
    }

    case 'delete': {
      const t = findTask(args[1]); if (!t) return;
      tasks = tasks.filter(x => x.id !== t.id);
      ok(`Task ${t.id} deleted`);
      emit('');
      break;
    }

    case 'mark-in-progress': {
      const t = findTask(args[1]); if (!t) return;
      t.status = 'in-progress'; t.ua = now();
      ok(`Task ${t.id} → in-progress`);
      emit('');
      break;
    }

    case 'mark-done': {
      const t = findTask(args[1]); if (!t) return;
      t.status = 'done'; t.ua = now();
      ok(`Task ${t.id} → done`);
      emit('');
      break;
    }

    case 'show': {
      const t = findTask(args[1]); if (!t) return;
      emit('');
      renderDetail(t);
      emit('');
      break;
    }

    case 'search': {
      const q = args.slice(1).join(' ').toLowerCase();
      if (!q) { err('Search query is required'); return; }
      const list = tasks.filter(t => t.desc.toLowerCase().includes(q));
      emit('');
      renderHeaderBox(`Search · "${q}"`);
      emit('');
      renderStats(tasks);
      emit('');
      if (list.length === 0) info('No tasks matched your query.');
      else renderTable(list);
      emit('');
      break;
    }

    case 'help':
      renderHelp();
      break;

    default:
      err(`Unknown command: ${cmd}`);
      info('Type  task-cli  for help');
      emit('');
  }
}

// ── Input handling ────────────────────────────────────────────────────────────
const inp = document.getElementById('inp');

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const raw = inp.value.trim();
    if (!raw) return;
    history.unshift(raw); histIdx = -1;

    emit(cg('$ ') + cw(raw));
    inp.value = '';

    // Strip optional 'task-cli' prefix
    let tokens = raw.split(/\s+/);
    if (tokens[0] === 'task-cli') tokens = tokens.slice(1);
    dispatch(tokens);
    scroll();

  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx + 1 < history.length) inp.value = history[++histIdx];
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    histIdx > 0 ? (inp.value = history[--histIdx]) : (histIdx = -1, inp.value = '');
  }
});

document.addEventListener('click', () => inp.focus());

// ── Boot ──────────────────────────────────────────────────────────────────────
emit(cg('$ ') + cw('task-cli list'));
listCmd(null);
scroll();
</script>
</body>
</html>
